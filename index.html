      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

      const s = document.createElement('script');

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

 border-radius: 999px; background: linear-gradient(90deg, #DCE4FF, #1E40FF, #0A1A44); margin-top: 18px;\">\n        <div style=\"position: absolute; top: 50%; left: 35%; transform: translate(-50%,-50%); width: 22px; height: 22px; border-radius: 50%; background: #B7FF2A; border: 3px solid #fff; box-shadow: 0 3px 8px rgba(10,26,68,0.3);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; justify-content: space-between; margin-top: 9px; font-size: 11px; font-weight: 600; color: rgba(10,26,68,0.45);\"><span>2.0<\u002Fspan><span>3.5<\u002Fspan><span>5.0<\u002Fspan><span>6.5<\u002Fspan><span>8.0<\u002Fspan><\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 24px; background: #F7F8FC; border-radius: 14px; padding: 14px 16px;\">\n        <span style=\"background: #0A1A44; color: #fff; font-family: 'Sora'; font-weight: 800; font-size: 15px; letter-spacing: 0.04em; padding: 5px 11px; border-radius: 7px;\">DUPR<\u002Fspan>\n        <div style=\"font-size: 12.5px; line-height: 1.45; color: rgba(10,26,68,0.6);\">Your official DUPR rating, synced right in Pickie. <strong style=\"color: #0A1A44;\">Coming soon.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MORE FEATURES ============ -->\n  <section id=\"features\" style=\"scroll-margin-top: 120px; max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-reveal\" style=\"text-align: center; max-width: 640px; margin: 0 auto 44px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">BEYOND THE SWIPE<\u002Fdiv>\n      <h2 style=\"font-size: clamp(30px, 4vw, 46px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Swiping is just the warm-up.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px;\">\n      <sc-for list=\"{{ feats }}\" as=\"feat\" hint-placeholder-count=\"4\">\n        <div class=\"pk-reveal\" style=\"background: #fff; border-radius: 20px; padding: 26px 24px; border: 1px solid #E4E7F0;\" style-hover=\"transform: translateY(-5px); box-shadow: 0 20px 40px -22px rgba(10,26,68,0.3);\">\n          <div style=\"width: 46px; height: 46px; border-radius: 13px; background: rgba(30,64,255,0.1); display: flex; align-items: center; justify-content: center; color: #1E40FF; margin-bottom: 18px;\">{{ feat.icon }}<\u002Fdiv>\n          <div style=\"font-size: 17px; font-weight: 800; letter-spacing: -0.02em;\">{{ feat.title }}<\u002Fdiv>\n          <p style=\"font-size: 13.5px; line-height: 1.55; color: rgba(10,26,68,0.62); margin-top: 8px;\">{{ feat.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOUNDER STORY ============ -->\n  <section id=\"founder\" style=\"scroll-margin-top: 120px; max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-split\" style=\"background: #fff; border: 1px solid #E4E7F0; border-radius: 32px; padding: clamp(32px, 5vw, 60px); display: grid; grid-template-columns: 0.8fr 1.2fr; gap: clamp(32px, 4vw, 60px); align-items: center;\">\n      <!-- photo -->\n      <div>\n        <div style=\"position: relative;\">\n          <div style=\"position: absolute; inset: 14px -14px -14px 14px; background: #B7FF2A; border-radius: 28px; transform: rotate(-2deg);\"><\u002Fdiv>\n          <div style=\"position: relative; width: 100%; aspect-ratio: 4 / 5;\">\n            <img src=\"6ca15bfd-7a19-4ea1-8710-d98432b65313\" alt=\"Kevin Kennedy Kie, founder of Pickie\" style=\"position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 24px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 28px;\">\n          <span style=\"width: 10px; height: 10px; border-radius: 50%; background: #B7FF2A; border: 2px solid #0A1A44;\"><\u002Fspan>\n          <div>\n            <div style=\"font-family: 'Sora'; font-weight: 800; font-size: 18px; letter-spacing: -0.02em;\">Kevin Kennedy Kie<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(10,26,68,0.55);\">Founder, Pickie<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- story -->\n      <div>\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">THE STORY BEHIND PICKIE<\u002Fdiv>\n        <h2 style=\"font-size: clamp(28px, 3.6vw, 42px); line-height: 1.06; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Why I built Pickie.<\u002Fh2>\n        <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 20px; font-size: 16px; line-height: 1.65; color: rgba(10,26,68,0.68);\">\n          <p>My first pickleball game was August 2024 in Ho Chi Minh City. A friend dragged me along \"just to try it.\" By the last rally, I was hooked.<\u002Fp>\n          <p>One game became every game. Casual social sessions turned into competitive ones, and competitive ones turned into tournaments across cities in Indonesia and Vietnam. Along the way I partnered with more players than I can count, and the same struggle followed me to every court: finding a partner you truly click with is hard. Not just a similar level. Real chemistry, the kind that makes a game flow.<\u002Fp>\n          <p>So I turned everything those matches taught me into Pickie's chemistry algorithm, built for players who want more partners who fit and for anyone just picking up a paddle. Whether you play for the social side, for tournaments, or just for fun, Pickie helps you connect with the people who fit your game.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: inline-block; background: #0A1A44; color: #FFFFFF; border-radius: 18px 18px 18px 4px; padding: 18px 22px; margin-top: 24px;\">\n          <div style=\"font-family: 'Sora'; font-weight: 800; font-size: clamp(16px, 1.6vw, 19px); line-height: 1.4; letter-spacing: -0.01em; text-wrap: balance;\">\"Pickleball is fun. The right chemistry makes it <span style=\"color: #B7FF2A;\">even more fun.<\u002Fspan>\"<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 14.5px; line-height: 1.6; color: rgba(10,26,68,0.55); margin-top: 20px;\">Kevin's hope is bigger than one app: grow pickleball from Indonesia and Vietnam across Southeast Asia and far beyond it — everywhere in the world a net goes up.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faq\" style=\"scroll-margin-top: 120px; max-width: 760px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-reveal\" style=\"text-align: center; margin-bottom: 36px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">FAQ<\u002Fdiv>\n      <h2 style=\"font-size: clamp(30px, 4vw, 40px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">\n\n\n\nYour Pickie questions, answered.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"4\">\n        <div class=\"pk-reveal\" style=\"background: #fff; border: 1px solid #E4E7F0; border-radius: 16px; overflow: hidden;\">\n          <button onclick=\"{{ faq.toggle }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; background: transparent; border: none; cursor: pointer; text-align: left; font-family: 'Sora', sans-serif;\">\n            <span style=\"font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: #0A1A44;\">{{ faq.q }}<\u002Fspan>\n            <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"#1E40FF\" stroke-width= n&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Motion&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, faqOpen: 0, showTop: false };\n\n  componentDidMount() {\n    if (this._pkObs) this._pkObs.disconnect();\n    if (this._pkMut) this._pkMut.disconnect();\n    if (this._hiwTimer) { clearInterval(this._hiwTimer); this._hiwTimer = null; }\n    if (this._avTimer) { clearInterval(this._avTimer); this._avTimer = null; }\n    if (this._heroTimer) { clearInterval(this._heroTimer); this._heroTimer = null; }\n    if (this._hiwScroll) window.removeEventListener('scroll', this._hiwScroll);\n\n    // Live avatar carousel: 15 randomized initials cycle through, new ones\n    // slide in from the left, oldest fades out — max 4 visible at once.\n    try {\n      const strip = document.querySelector('.pk-hero-stats .pk-av-wrap');\n      if (strip && !this.props.reduceMotion) {\n        const pool = 'ABCDEFGHJKLMNPRSTUVWY'.split('');\n        const grads = [\n          ['linear-gradient(135deg,#1E40FF,#0A1A44)', '#FFFFFF'],\n          ['linear-gradient(135deg,#B7FF2A,#71A800)', '#0A1A44'],\n          ['linear-gradient(135deg,#7FA3FF,#1E40FF)', '#FFFFFF'],\n          ['linear-gradient(135deg,#13235A,#071233)', '#FFFFFF'],\n        ];\n        const letters = Array.from({ length: 15 }, () => pool[Math.floor(Math.random() * pool.length)]);\n        const SLOT = 24;\n        strip.innerHTML = '';\n        strip.style.position = 'relative';\n        strip.style.width = '106px';\n        strip.style.height = '38px';\n        strip.style.flex = 'none';\n        const mk = (letter, gi, slot) => {\n          const el = document.createElement('span');\n          const g = grads[gi % grads.length];\n          el.textContent = letter;\n          el.style.cssText = 'position:absolute;left:0;top:2px;width:34px;height:34px;border-radius:50%;border:2px solid #fff;box-siz Timer = setInterval(() => {\n          if (document.hidden) return;\n          card.style.transition = 'transform 0.5s ease-in, opacity 0.5s ease-in';\n          card.style.transform = 'translateX(52px) rotate(5deg)';\n          card.style.opacity = '0';\n          setTimeout(() => {\n            hi = (hi + 1) % profiles.length;\n            set(profiles[hi]);\n            card.style.transition = 'none';\n            card.style.transform = 'translateX(-26px) rotate(-2deg)';\n            void card.offsetWidth;\n            card.style.transition = 'transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.55s ease';\n            card.style.transform = 'none';\n            card.style.opacity = '1';\n          }, 520);\n        }, 3600);\n      }\n    } catch (e) {}\n\n    document.body.classList.toggle('pk-still', !!this.props.reduceMotion);\n\n    // Scroll-to-top button visibility (independent of reduce-motion).\n    if (this._topScroll) window.removeEventListener('scroll', this._topScroll);\n    this._topScroll = () => {\n      const b = document.querySelector('.pk-totop');\n      if (!b) return;\n      const v = window.scrollY > 560;\n      b.style.opacity = v ? '1' : '0';\n      b.style.pointerEvents = v ? 'auto' : 'none';\n    };\n    window.addEventListener('scroll', this._topScroll, { passive: true });\n    this._topScroll();\n\n    // Manual reduce-motion tweak: keep everything visible, run no observers/timers.\n    if (this.props.reduceMotion) return;\n\n    // Only hide/reveal when a live animation pipeline exists (two rAF ticks).\n    // Static contexts (print, PDF, screenshots) keep everything visible.\n    requestAnimationFrame(() => requestAnimationFrame(() => {\n      document.body.classList.add('pk-motion');\n      this._pkStart();\n    }));\n\n    // Typewriter loop on the hero headline accent (People variant only).\n    if (this._twTimer) clearTimeout(this._twTimer);\n    if (this._twFit) window.removeEventListener('resize', this._twFit);\n    if ((this.props.heroVariant ?? 'People') === 'People') {\n      const twPre = document.querySelector('.pk-tw-pre');\n      const twAcc = document.querySelector('.pk-tw-acc');\n      const twCaret = document.querySelector('.pk-tw-caret');\n      if (twPre && twAcc && twCaret) {\n        const phrases = [\n          ['pickleball ', 'people.'],\n          ['next ', 'game.'],\n          ['doubles ', 'partner.'],\n          ['level ', 'match.'],\n          ['court ', 'chemistry.'],\n          ['weekend ', 'crew.'],\n        ];\n        // Keep the typed phrase on ONE line: scale the block's font so even the\n        // longest phrase fits the column width. Headline stays 2 lines, no gaps.\n        const twBlock = twPre.parentElement;\n        twCaret.style.display = 'inline-block';\n        this._twFit = () => {\n          const keepPre = twPre.textContent, keepAcc = twAcc.textContent;\n          twBlock.style.whiteSpace = 'nowrap';\n          twBlock.style.fontSize = '';\n          twBlock.style.minHeight = '';\n          let maxW = 0;\n          for (const ph of phrases) {\n            twPre.textContent = ph[0]; twAcc.textContent = ph[1];\n            if (twBlock.scrollWidth > maxW) maxW = twBlock.scrollWidth;\n          }\n          const avail = twBlock.clientWidth;\n          const scale = Math.min(1, avail / (maxW + 4));\n          twBlock.style.fontSize = (scale * 100).toFixed(1) + '%';\n          twPre.textContent = keepPre; twAcc.textContent = keepAcc;\n        };\n        this._twFit();\n        window.addEventListener('resize', this._twFit);\n\n        let pi = 0;\n        let count = phrases[0][0].length + phrases[0][1].length;\n        let mode = 'hold';\n        const paint = () => {\n          const pre = phrases[pi][0], acc = phrases[pi][1];\n          twPre.textContent = pre.slice(0, Math.min(count, pre.length));\n          twAcc.textContent = count > pre.length ? acc.slice(0, count - pre.length) : '';\n        };\n        const tick = () => {\n          let delay = 60;\n          if (mode === 'hold') {\n            mode = 'del';\n            twCaret.style.animation = 'none';\n            twCaret.style.opacity = '1';\n            delay = 40;\n          } else if (mode === 'del') {\n            count--; paint();\n            if (count <= 0) { pi = (pi + 1) % phrases.length; mode = 'type'; delay = 420; }\n            else delay = 28;\n          } else {\n            count++; paint();\n            if (count >= phrases[pi][0].length + phrases[pi][1].length) {\n              mode = 'hold';\n              twCaret.style.animation = 'pkCaretBlink 1.05s ease infinite';\n              delay = 2100;\n            } else delay = 56 + Math.random() * 36;\n          }\n          this._twTimer = setTimeout(tick, delay);\n        };\n        twCaret.style.display = 'inline-block';\n        twCaret.style.animation = 'pkCaretBlink 1.05s ease infinite';\n        paint();\n        this._twTimer = setTimeout(tick, 2100);\n      }\n    }\n\n    // On mobile the How-it-works phone can't be sticky in a single column,\n    // so auto-play its five screens on a timer instead of driving them from scroll.\n    if (window.innerWidth <= 900) {\n      setTimeout(() => {\n        const screens = document.querySelectorAll('.pk-hiw-screen');\n        if (!screens.length) return;\n        // Radar ping follows the auto-playing screen (dots only — steps stay readable).\n        const paintDots = (idx) => {\n          document.querySelectorAll('.pk-hiw-step').forEach((st, k) => {\n            const dot = st.querySelector('.pk-hiw-dot');\n            if (!dot) return;\n            dot.style.background = k === idx ? '#1E40FF' : '#FFFFFF';\n            dot.style.borderColor = k === idx ? '#1E40FF' : '#C9D0E4';\n            dot.classList.toggle('pk-live', k === idx);\n          });\n        };\n        let i = 0;\n        paintDots(0);\n        this._hiwTimer = setInterval(() => {\n          i = (i + 1) % screens.length;\n          screens.forEach((s, k) => {\n            s.style.opacity = k === i ? '1' : '0';\n            s.style.transform = k === i ? 'none' : 'translateY(12px)';\n            s.style.zIndex = k === i ? '2' : '1';\n          });\n          paintDots(i);\n        }, 2600);\n      }, 400);\n      return;\n    }\n\n    this._hiwScroll = () => {\n      if (this._hiwRaf) return;\n      this._hiwRaf = requestAnimationFrame(() => {\n        this._hiwRaf = null;\n        const steps = document.querySelectorAll('.pk-hiw-step');\n        const screens = document.querySelectorAll('.pk-hiw-screen');\n        if (!steps.length || !screens.length) return;\n        const mid = window.innerHeight * 0.5;\n        let act = 0;\n        for (let i = 0; i < steps.length; i++) {\n          if (steps[i].getBoundingClientRect().top <= mid) act = i;\n        }\n        if (this._hiwActive === act) return;\n        this._hiwActive = act;\n        screens.forEach((s, i) => {\n          s.style.opacity = i === act ? '1' : '0';\n          s.style.transform = i === act ? 'none' : 'translateY(12px)';\n          s.style.zIndex = i === act ? '2' : '1';\n        });\n        steps.forEach((st, i) => {\n          st.style.opacity = i === act ? '1' : '0.38';\n          const dot = st.querySelector('.pk-hiw-dot');\n          if (dot) {\n            dot.style.background = i === act ? '#1E40FF' : '#FFFFFF';\n            dot.style.borderColor = i === act ? '#1E40FF' : '#C9D0E4';\n            dot.classList.toggle('pk-live', i === act);\n          }\n        });\n      });\n    };\n    window.addEventListener('scroll', this._hiwScroll, { passive: true });\n    setTimeout(this._hiwScroll, 350);\n    setTimeout(this._hiwScroll, 1400);\n  }\n\n  _pkStart() {\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (!entry.isIntersecting) return;\n        const el = entry.target;\n        const parent = el.parentElement;\n        if (parent) {\n          const sibs = Array.prototype.filter.call(parent.child
