  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-gradient(90deg, #DCE4FF, #1E40FF, #0A1A44); margin-top: 18px;\">\n        <div style=\"position: absolute; top: 50%; left: 35%; transform: translate(-50%,-50%); width: 22px; height: 22px; border-radius: 50%; background: #B7FF2A; border: 3px solid #fff; box-shadow: 0 3px 8px rgba(10,26,68,0.3);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; justify-content: space-between; margin-top: 9px; font-size: 11px; font-weight: 600; color: rgba(10,26,68,0.45);\"><span>2.0<\u002Fspan><span>3.5<\u002Fspan><span>5.0<\u002Fspan><span>6.5<\u002Fspan><span>8.0<\u002Fspan><\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 24px; background: #F7F8FC; border-radius: 14px; padding: 14px 16px;\">\n        <span style=\"background: #0A1A44; color: #fff; font-family: 'Sora'; font-weight: 800; font-size: 15px; letter-spacing: 0.04em; padding: 5px 11px; border-radius: 7px;\">DUPR<\u002Fspan>\n        <div style=\"font-size: 12.5px; line-height: 1.45; color: rgba(10,26,68,0.6);\">Your official DUPR rating, synced right in Pickie. <strong style=\"color: #0A1A44;\">Coming soon.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MORE FEATURES ============ -->\n  <section id=\"features\" style=\"scroll-margin-top: 76px; max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-reveal\" style=\"text-align: center; max-width: 640px; margin: 0 auto 44px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">BEYOND THE SWIPE<\u002Fdiv>\n      <h2 style=\"font-size: clamp(30px, 4vw, 46px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Swiping is just the warm-up.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px;\">\n      <sc-for list=\"{{ feats }}\" as=\"feat\" hint-placeholder-count rgin-top: 28px;\">\n          <span style=\"width: 10px; height: 10px; border-radius: 50%; background: #B7FF2A; border: 2px solid #0A1A44;\"><\u002Fspan>\n          <div>\n            <div style=\"font-family: 'Sora'; font-weight: 800; font-size: 18px; letter-spacing: -0.02em;\">Kevin Kennedy Kie<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(10,26,68,0.55);\">Founder, Pickie<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- story -->\n      <div>\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">FROM THE FOUNDER<\u002Fdiv>\n        <h2 style=\"font-size: clamp(28px, 3.6vw, 42px); line-height: 1.06; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Why I built Pickie.<\u002Fh2>\n        <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 20px; font-size: 16px; line-height: 1.65; color: rgba(10,26,68,0.68);\">\n          <p>My first pickleball game was August 2024 in Ho Chi Minh City. A friend dragged me along, and I was hooked before it ended.<\u002Fp>\n          <p>Since then I've played tournaments across cities and countries, and partnered with more players than I can count. The same struggle followed me everywhere: finding a partner you truly click with is hard. Not just a similar level. Real chemistry, the kind that makes a game flow.<\u002Fp>\n          <p>So I turned everything those matches taught me into Pickie's chemistry algorithm, built for players who want more partners who fit and for anyone just picking up a paddle. Whether you play for the social side, for tournaments, or just for fun, Pickie helps you connect with the people who fit your game.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: inline-block; background: #0A1A44; color: #FFFFFF; border-radius: 18px 18px 18px 4px; padding: 18px 22px; margin-top: 24px;\">\n          <div style=\"font-family: 'Sora'; font-weight: 800; font-size: clamp(16px, 1.6vw, 19px); line-height: 1.4; letter-spacing: -0.01em; text-wrap: balance;\">\"Pickleball should be fun. Playing with people is fun. Playing with the right people, with the right chemistry? <span style=\"color: #B7FF2A;\">Even more fun.<\u002Fspan>\"<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 14.5px; line-height: 1.6; color: rgba(10,26,68,0.55); margin-top: 20px;\">Kevin's hope is bigger than one app: grow pickleball in Indonesia, Vietnam, across Southeast Asia, and everywhere a net goes up.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faq\" style=\"scroll-margin-top: 76px; max-width: 760px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-reveal\" style=\"text-align: center; margin-bottom: 36px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1E40FF; margin-bottom: 12px;\">FAQ<\u002Fdiv>\n      <h2 style=\"font-size: clamp(30px, 4vw, 46px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">You ask, we answer.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"4\">\n        <div class=\"pk-reveal\" style=\"background: #fff; border: 1px solid #E4E7F0; border-radius: 16px; overflow: hidden;\">\n          <button onclick=\"{{ faq.toggle }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; background: transparent; border: none; cursor: pointer; text-align: left; font-family: 'Sora', sans-serif;\">\n            <span style=\"font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: #0A1A44;\">{{ faq.q }}<\u002Fspan>\n            <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"#1E40FF\" stroke-width=\"2.4\" stroke-linecap=\"round\" style=\"flex: none; transform: rotate({{ faq.rot }}deg); transition: transform 0.25s ease;\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <sc-if value=\"{{ faq.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"padding: 0 20px 18px; font-size: 14.5px; line-height: 1.65; color: rgba(10,26,68,0.65); margin: 0;\">{{ faq.a }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FINAL CTA ============ -->\n  <section id=\"get\" style=\"max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div style=\"background: linear-gradient(135deg, #0A1A44 0%, #1E40FF 100%); border-radius: 32px; padding: clamp(44px, 6vw, 76px) clamp(28px, 5vw, 60px); text-align: center; position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; bottom: -80px; left: -40px; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(183,255,42,0.22), transparent 70%); animation: pkDrift1 18s ease-in-out infinite; will-change: transform;\"><\u002Fdiv>\n      <div style=\"position: absolute; top: -100px; right: -20px; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, rgba(30,64,255,0.30), transparent 70%); animation: pkDrift2 22s ease-in-out infinite; will-change: transform;\"><\u002Fdiv>\n      <div class=\"pk-reveal\" style=\"position: relative;\">\n        <h2 style=\"font-size: clamp(34px, 5vw, 60px); line-height: 1.0; letter-spacing: -0.035em; font-weight: 800; color: #fff; text-wrap: balance;\">It's okay to be <span style=\"color:#B7FF2A;\">Pickie.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size: 18px; line-height: 1.5; color: rgba(255,255,255,0.72); margin: 20px auto 0; max-width: 480px;\">Your next great match is out there. Swipe, match, and go play.<\u002Fp>\n        <div style=\"display: flex; gap: 12px; justify-content: center; margin-top: 34px; flex-wrap: rAll('.pk-hero-stats .pk-av').forEach((el) => {\n        el.textContent = pool[Math.floor(Math.random() * pool.length)];\n      });\n    } catch (e) {}\n\n    // Manual reduce-motion tweak: keep everything visible, run no observers/timers.\n    if (this.props.reduceMotion) return;\n\n    // Only hide/reveal when a live animation pipeline exists (two rAF ticks).\n    // Static contexts (print, PDF, screenshots) keep everything visible.\n    requestAnimationFrame(() => requestAnimationFrame(() => {\n      document.body.classList.add('pk-motion');\n      this._pkStart();\n    }));\n\n    // On mobile the How-it-works phone can't be sticky in a single column,\n    // so auto-play its five screens on a timer instead of driving them from scroll.\n    if (window.innerWidth <= 900) {\n      setTimeout(() => {\n        const screens = document.querySelectorAll('.pk-hiw-screen');\n        if (!screens.length) return;\n        let i = 0;\n        this._hiwTimer = setInterval(() => {\n          i = (i + 1) % screens.length;\n          screens.forEach((s, k) => {\n            s.style.opacity = k === i ? '1' : '0';\n            s.style.transform = k === i ? 'none' : 'translateY(12px)';\n            s.style.zIndex = k === i ? '2' : '1';\n          });\n        }, 2600);\n      }, 400);\n      return;\n    }\n\n    this._hiwScroll = () => {\n      if (this._hiwRaf) return;\n      this._hiwRaf = requestAnimationFrame(() => {\n        this._hiwRaf = null;\n        const steps = document.querySelectorAll('.pk-hiw-step');\n        const screens = document.querySelectorAll('.pk-hiw-screen');\n        if (!steps.length || !screens.length) return;\n        const mid = window.innerHeight * 0.5;\n        let act = 0;\n        for (let i = 0; i < steps.length; i++) {\n          if (steps[i].getBoundingClientRect().top <= mid) act = i;\n        }\n        if (this._hiwActive === act) return;\n        this._hiwActive = act;\n        screens.forEach((s, i) => {\n          s.style.opacity = i === act ? '1' : '0';\n          s.style.transform = i === act ? 'none' : 'translateY(12px)';\n          s.style.zIndex = i === act ? '2' : '1';\n        });\n        steps.forEach((st, i) => {\n          st.style.opacity = i === act ? '1' : '0.38';\n          const dot = st.querySelector('.pk-hiw-dot');\n          if (dot) {\n            dot.style.background = i === act ? '#1E40FF' : '#FFFFFF';\n            dot.style.borderColor = i === act ? '#1E40FF' : '#C9D0E4';\n          }\n        });\n      });\n    };\n    window.addEventListener('scroll', this._hiwScroll, { passive: true });\n    setTimeout(this._hiwScroll, 350);\n    setTimeout(this._hiwScroll, 1400);\n  }\n\n  _pkStart() {\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (!entry.isIntersecting) return;\n        const el = entry.target;\n        const parent = el.parentElement;\n        if (parent) {\n          const sibs = Array.prototype.filter.call(parent.children, (c) => c.classList && c.classList.contains('pk-reveal'));\n          const idx = sibs.indexOf(el);\n          if (idx > 0) el.style.transitionDelay = Math.min(idx * 90, 450) + 'ms';\n        }\n        el.classList.add('pk-in');\n        io.unobserve(el);\n        if (el.id === 'pkRing') this._countScore();\n      });\n    }, { threshold: 0.2, rootMargin: '0px 0px -30px 0px' });\n    const attach = (root) => {\n      if (!root.querySelectorAll) return;\n      if (root.classList && (root.classList.contains('pk-reveal') || root.classList.contains('pk-arc')) && !root.classList.contains('pk-in')) io.observe(root);\n      root.querySelectorAll('.pk-reveal:not(.pk-in), .pk-arc:not(.pk-in)').forEach((el) => io.observe(el));\n    };\n    attach(document.body);\n    const mo = new MutationObserver((muts) => {\n      muts.forEach((m) => m.addedNodes.forEach((n) => { if (n.nodeType === 1) attach(n); }));\n    });\n    mo.observe(document.body, { childList: true, subtree: true });\n    this._pkObs = io;\n    this._pkMut = mo;\n  }\n\n  componentWillUnmount() {\n    if (this._pkObs) this._pkObs.disconnect();\n    if (this._pkMut) this._pkMut.disconnect();\n    if (this._hiwTimer) clearInterval(this._hiwTimer);\n    if (this._hiwScroll) window.removeEventListener('scroll', this._hiwScroll);\n  }\n\n  _countScore() {\n    if (this._counted) return;\n    this._counted = true;\n    const el = document.getElementById('pkScore');\n    if (!el) return;\n    const start = performance.now();\n    const dur = 1500;\n    const tick = (t) => {\n      const p = Math.min(1, (t - start) / dur);\n      el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * 87) + '%';\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  renderVals() {\n    const ic = (path, sw) => React.createElement('svg', { viewBox: '0 0 24 24', width: 24, height: 24, fill: 'none', stroke: 'currentColor', strokeWidth: sw || 2, strokeLinecap: 'round', strokeLinejoin: 'round' }, React.createElement('path', { d: path }));\n    const icMulti = (children) => React.createElement('svg', { viewBox: '0 0 24 24', width: 24, height: 24, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' }, children);\n\n    const steps = [\n      { num: '01', title: 'Easy setup', body: 'Google, Apple, or a quick email code. No passwords, no long forms. Sign in and go find your people.', value: 'Zero friction', icon: icMulti([React.createElement('path',{key:1,d:'M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4'}), React.createElement('path',{key:2,d:'M10 17l5-5-5-5'}), React.createElement('path',{key:3,d:'M15 12H3'})]) },\n      { num: '02', title: 'Be pickie about it', body: 'Set your distance, level range, and play days. Only players who actually fit make it into your deck.', value: 'No wasted swipes', icon: icMulti([React.createElement('rect',{key:1,x:8,y:2,width:8,height:4,rx:1}), React.createElement('path',{key:2,d:'M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2'}), React.createElement('path',{key:3,d:'M9 12h6M9 16h4'})]) },\n      { num: '03', title: 'Find players, swipe away', body: 'Your deck fills with players who pass your filters. Like the look of a game? Swipe right.', value: 'No lopsided games', icon: icMulti([React.createElement('rect',{key:1,x:3,y:6,width:14,height:15,rx:2.5}), React.createElement('path',{key:2,d:'M8 3h11a2 2 0 0 1 2 2v13'})]) },\n      { num: '04', title: 'Chemistry score (beta)', body: 'Every match comes with a score out of 100, plus a plain reason why you two click on court.', value: 'Know before you play', icon: icMulti([React.createElement('path',{key:1,d:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'})]) },\n      { num: '05', title: 'Get connected', body: 'Matched? The chat is open. Say hi, pick a court, and lock in a time. See you out there.', value: 'From chat to court', icon: icMulti([React.createElement('path',{key:1,d:'M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8'}), React.createElement('path',{key:2,d:'M21 3v5h-5'}), React.createElement('path',{key:3,d:'M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16'}), React.createElement('path',{key:4,d:'M8 16H3v5'})]) },\n    ];\n\n    const dims = [\n      { title: 'Play style fit', body: 'Dinker, banger, all-court. Styles that complement each other.', icon: icMulti([React.createElement('circle',{key:1,cx:12,cy:9,r:6}), React.createElement('path',{key:2,d:'M12 15v6M9 21h6'})]) },\n      { title: 'Side preference', body: 'Left, right, or flexible. Doubles that slot together.', icon: icMulti([React.createElement('path',{key:1,d:'M8 3 4 7l4 4'}), React.createElement('path',{key:2,d:'M4 7h16'}), React.createElement('path',{key:3,d:'m16 21 4-4-4-4'}), React.createElement('path',{key:4,d:'M20 17H4'})]) },\n      { title: 'Schedule overlap', body: 'Play days that line up, so games actually happen.', icon: icMulti([React.createElement('rect',{key:1,x:3,y:4.5,width:18,height:16,rx:2.5}), React.createElement('path',{key:2,d:'M3 9h18M8 3v4M16 3v4'})]) },\n      { title: 'Zone & distance', body: 'Players and courts inside your radius. No long drives.', icon: icMulti([React.createElement('path',{key:1,d:'M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z'}), React.createElement('circle',{key:2,cx:12,cy:10,r:2.6})]) },\n    ];\n\n    const feats = [\n      { title: 'Matches & chat', body: 'Every mutual like lands in Matches, chemistry breakdown included. Instant icebreaker.', icon: icMulti([React.createElement('path',{key:1,d:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'})]) },\n      { title: 'Dial-in filters', body: 'Level, distance, schedule, play style. Your queue, your rules.', icon: icMulti([React.createElement('path',{key:1,d:'M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3'}), React.createElement('path',{key:2,d:'M2 14h4M10 8h4M18 16h4'})]) },\n      { title: 'Rate your match', body: 'A quick, honest rating after you play keeps every chemistry score sharp.', icon: icMulti([React.createElement('path',{key:1,d:'M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9.1l6.9-.8z'})]) },\n      { title: 'Safety built in', body: 'Block and report from any profile or chat. Real people review every report.', icon: icMulti([React.createElement('path',{key:1,d:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'}), React.createElement('path',{key:2,d:'M9 12l2 2 4-4'})]) },\n    ];\n\n    const faqs = [\n      { q: 'Is Pickie free?', a: \"Yes. Swiping, matching, and chatting are all free. Match Now gives you 2 free chemistry checks a day, and Premium bumps that to 10 with zero ads.\" },\n      { q: 'How does the chemistry score work?', a: \"Pickie looks at what actually shapes a game: level, play style, side preference, schedule, and location. You get a score out of 100 plus a plain reason behind it. Every rated match makes the next score sharper.\" },\n      { q: 'Do I need a DUPR rating to join?', a: \"Nope. Pick your level during setup and start matching right away. Official DUPR sync is coming soon, and rating your matches keeps your level honest in the meantime.\" },\n      { q: \"I just started playing. Is Pickie for me?\", a: \"Especially you. Tell Pickie you're new and it pairs you with patient partners at your level. Social games, tournament prep, or just for fun, you choose the vibe.\" },\n    ].map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.faqOpen === i,\n      rot: this.state.faqOpen === i ? 180 : 0,\n      toggle: () => this.setState((s) => ({ faqOpen: s.faqOpen === i ? -1 : i })),\n    }));\n\n    const heroVariants = {\n      'People':    { eyebrow: 'SWIPE. MATCH. PLAY.',    l1: 'Find your',       l2: 'pickleball',   accent: 'people.', sub: 'Level, location, schedule, play style. Pickie scores the chemistry between players so every game just clicks. Swipe, match, and go play.' },\n      'Chemistry': { eyebrow: 'MATCHED ON CHEMISTRY',   l1: 'Play with people', l2: 'who just',     accent: 'click.',  sub: 'Pickie scores your chemistry on level, style, schedule, and side, so every match feels fair, fun, and worth showing up for.' },\n      'Play more': { eyebrow: 'YOUR NEXT GAME, SORTED', l1: 'Never scramble',   l2: 'for a fourth', accent: 'again.',  sub: \"Find players at your level, near you, when you're free. Match, chat, and get on court, faster.\" },\n    };\n    const hv = heroVariants[this.props.heroVariant] || heroVariants['People'];\n\n    return {\n      steps, dims, feats, faqs,\n      heroEyebrow: hv.eyebrow, heroL1: hv.l1, heroL2: hv.l2, heroAccent: hv.accent, heroSub: hv.sub,\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
